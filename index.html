<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOOK UP</title>
    <link rel="icon" href="imgs/favicon.png" type="image/x-icon">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom Styles for Hook Up Store */
        :root {
            --brand-accent: #ff3e00;
        }

        [x-cloak] { 
            display: none !important; 
        }

        body {
            background-color: #020202;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 62, 0, 0.2) transparent;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 62, 0, 0.2);
            border-radius: 10px;
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .bg-view-glow {
            background: radial-gradient(circle at center, rgba(255, 62, 0, 0.08) 0%, #020202 100%);
        }

        .font-display {
            font-family: 'Lexend', sans-serif;
        }

        .font-accent {
            font-family: 'Outfit', sans-serif;
        }
    </style>
    <!-- Alpine.js Plugins -->
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.407.0/dist/umd/lucide.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#020202',
                            accent: '#ff3e00',
                            secondary: '#5865f2',
                            surface: '#0a0a0a'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Lexend', 'sans-serif'],
                        accent: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg text-white selection:bg-brand-accent selection:text-white font-sans overflow-x-hidden" x-data="appData()">
    
    <!-- Ambient Background -->
    <div class="fixed inset-0 -z-50 overflow-hidden bg-[#020202]">
        <div class="absolute -top-[10%] -left-[5%] w-[80%] h-[80%] rounded-full bg-brand-accent/10 blur-[160px] animate-pulse"></div>
        <div class="absolute -bottom-[20%] -right-[5%] w-[70%] h-[70%] rounded-full bg-brand-secondary/10 blur-[140px] animate-pulse" style="animation-delay: 2s;"></div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_50%_0%,rgba(255,62,0,0.03),transparent_70%)]"></div>
        <div class="absolute inset-0 bg-[url('https://grainy-gradients.vercel.app/noise.svg')] opacity-[0.02] pointer-events-none mix-blend-overlay"></div>
    </div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 px-6 md:px-12 py-6 flex justify-between items-center bg-brand-bg/60 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center">
            <img :src="LOGO_URL" alt="Logo" class="w-8 h-8 object-contain">
        </div>
        <div class="flex items-center gap-6">
            <!-- Language Switcher -->
            <div class="flex items-center bg-black/40 p-1 rounded-full border border-white/10 backdrop-blur-md">
                <button @click="lang = 'id'" 
                        :class="lang === 'id' ? 'bg-white text-black shadow-lg shadow-white/10' : 'text-slate-400 hover:text-white'" 
                        class="flex items-center gap-2 px-4 py-2 rounded-full transition-all text-[11px] font-black uppercase tracking-wider">
                    <img src="https://flagcdn.com/id.svg" class="w-4 h-3 object-contain"> IND
                </button>
                <button @click="lang = 'en'" 
                        :class="lang === 'en' ? 'bg-white text-black shadow-lg shadow-white/10' : 'text-slate-400 hover:text-white'" 
                        class="flex items-center gap-2 px-4 py-2 rounded-full transition-all text-[11px] font-black uppercase tracking-wider">
                    <img src="https://flagcdn.com/us.svg" class="w-4 h-3 object-contain"> ENG
                </button>
            </div>
            <a href="https://discord.gg/8CAc4uMfF8" target="_blank" class="hidden md:block px-8 py-3 rounded-full bg-[#ff3e00] text-white text-[12px] font-black uppercase tracking-wider hover:brightness-110 active:scale-95 transition-all font-display shadow-[0_0_20px_rgba(255,62,0,0.3)] flex items-center justify-center">
                <span x-text="t().joinBtn"></span>
            </a>
        </div>
    </nav>

    <main>
        <!-- Hero Section -->
        <section class="relative min-h-screen flex flex-col items-center justify-center pt-20 px-6 text-center bg-view-glow">
            <!-- Badge -->
            <div class="mb-16 inline-flex items-center gap-3 px-6 py-2.5 rounded-full border border-brand-accent/30 text-brand-accent bg-transparent">
                <i data-lucide="star" class="w-3.5 h-3.5 fill-brand-accent"></i>
                <span class="text-[11px] font-black tracking-[0.2em] uppercase" x-text="t().badge"></span>
            </div>
            
            <!-- Central Logo -->
            <div class="relative mb-20 group">
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] md:w-[600px] md:h-[600px] bg-brand-accent/20 blur-[120px] rounded-full opacity-40 group-hover:opacity-60 transition-opacity"></div>
                <img :src="LOGO_URL" alt="Logo" class="relative z-10 w-48 h-48 md:w-80 md:h-80 object-contain brightness-110 drop-shadow-[0_0_80px_rgba(255,62,0,0.3)] select-none">
            </div>

            <!-- Description -->
            <p class="max-w-2xl text-lg md:text-xl text-slate-300/80 mb-16 font-medium leading-relaxed px-4" x-text="t().heroDesc"></p>

            <!-- Buttons -->
            <div class="flex flex-col sm:flex-row items-center gap-6">
                <button @click="isCatalogOpen = true" class="group flex items-center justify-center gap-3 px-12 py-5 rounded-full bg-brand-accent text-white font-black text-lg transition-all hover:scale-105 active:scale-95 font-display shadow-[0_10px_50px_rgba(255,62,0,0.3)]">
                    <span x-text="t().exploreBtn"></span>
                    <i data-lucide="arrow-right" class="w-6 h-6 group-hover:translate-x-1 transition-transform"></i>
                </button>
                <a href="https://discord.gg/8CAc4uMfF8" target="_blank" class="px-12 py-5 rounded-full bg-[#0a0a0a]/40 border border-white/10 text-white font-black text-lg transition-all hover:bg-white/5 hover:border-white/20 active:scale-95 font-display backdrop-blur-md shadow-2xl flex items-center justify-center">
                    <span x-text="t().joinBtn"></span>
                </a>
            </div>
        </section>

        <!-- About Section -->
        <section class="py-40 px-6 bg-[#0d0d0d] border-y border-white/[0.05] relative">
            <!-- Subtle Top Glow/Divider -->
            <div class="absolute top-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-brand-accent/20 to-transparent"></div>
            
            <div class="max-w-7xl mx-auto">
                <div class="max-w-4xl">
                    <h2 class="text-6xl md:text-8xl font-display font-black mb-12 tracking-tight uppercase text-white" x-text="t().kenapaTitle"></h2>
                    <div class="space-y-8">
                        <template x-for="paragraph in t().kenapaDesc.split('\n\n')">
                            <p class="text-slate-400 text-lg md:text-xl font-medium leading-relaxed" x-text="paragraph"></p>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Subtle Bottom Glow/Divider -->
            <div class="absolute bottom-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-brand-accent/10 to-transparent"></div>
        </section>

        <!-- Vendors Section -->
        <section id="vendors" class="py-32 px-6 bg-view-glow">
            <div class="max-w-7xl mx-auto">
                <div class="text-center mb-24">
                    <h2 class="text-5xl md:text-7xl font-display font-black leading-tight tracking-tighter uppercase mb-2" x-text="t().vendorsTitle"></h2>
                    <div class="h-1.5 w-24 bg-brand-accent mx-auto rounded-full"></div>
                </div>
                <div class="grid sm:grid-cols-2 gap-8">
                    <template x-for="(v, i) in t().vendorsList" :key="i">
                        <div class="p-12 bg-white/[0.02] border border-white/5 rounded-[32px] hover:border-brand-accent/20 transition-all shadow-xl group">
                            <span class="text-brand-accent font-black text-[10px] uppercase tracking-[0.4em] mb-4 block">Partner Vendor</span>
                            <h3 class="text-3xl font-bold mb-4 font-display group-hover:text-brand-accent transition-colors" x-text="v.name"></h3>
                            <p class="text-slate-400 leading-relaxed" x-text="v.desc"></p>
                        </div>
                    </template>
                </div>
            </div>
        </section>

        <!-- Features Section -->
        <section class="py-32 px-6 bg-view-glow">
            <div class="max-w-7xl mx-auto">
                <div class="mb-16">
                    <h2 class="text-5xl md:text-7xl font-display font-black leading-tight tracking-tighter uppercase skew-x-[-3deg]" x-text="t().featuresTitle"></h2>
                </div>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="(f, i) in features" :key="i">
                        <div :class="f.special ? 'bg-[#1a0a0a] border-[#301010] shadow-[0_20px_50px_rgba(255,62,0,0.05)]' : 'bg-[#111111] border-[#222222] hover:border-[#333333]'" 
                             class="p-8 rounded-[24px] border transition-all duration-500 flex flex-col group">
                            
                            <div x-show="!f.special">
                                <div class="mb-6 group-hover:scale-110 transition-transform">
                                    <template x-if="f.image">
                                        <img :src="f.image" class="w-12 h-12 object-contain" />
                                    </template>
                                    <template x-if="!f.image && f.icon">
                                        <div class="text-3xl" x-text="f.icon"></div>
                                    </template>
                                </div>
                                <h3 class="text-lg font-bold mb-3 font-display" x-text="t()['feature'+(i+1)+'Title']"></h3>
                                <p class="text-slate-400 text-sm font-medium" x-text="t()['feature'+(i+1)+'Desc']"></p>
                            </div>

                            <div x-show="f.special" class="h-full flex flex-col justify-between">
                                <div>
                                    <div class="flex items-center gap-3 mb-6">
                                        <template x-if="f.image">
                                            <img :src="f.image" class="w-10 h-10 object-contain" />
                                        </template>
                                        <template x-if="!f.image && f.icon">
                                            <span class="text-2xl" x-text="f.icon"></span>
                                        </template>
                                        <h3 class="text-lg font-bold font-display" x-text="t().feature6Title"></h3>
                                    </div>
                                    <p class="text-slate-400 text-sm font-medium" x-text="t().feature6Desc"></p>
                                </div>
                                <div class="mt-10">
                                    <a href="https://discord.gg/8CAc4uMfF8" target="_blank" class="flex items-center justify-center gap-2 px-6 py-3 rounded-full bg-[#ff3e00] text-white font-bold text-sm tracking-tight hover:brightness-110 active:scale-95 transition-all">
                                        <span x-text="t().joinBtn"></span>
                                        <i data-lucide="arrow-right" class="w-4 h-4"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </section>

        <!-- FAQ Section -->
        <section class="py-32 px-6 bg-view-glow">
            <div class="max-w-4xl mx-auto">
                <div class="text-center mb-24">
                    <h2 class="text-5xl md:text-7xl font-display font-black leading-tight tracking-tighter uppercase skew-x-[-3deg]" x-text="t().faqTitle"></h2>
                </div>
                <div class="space-y-4">
                    <template x-for="(item, i) in t().faqList" :key="i">
                        <div class="rounded-[32px] border bg-white/[0.02] border-white/5 overflow-hidden transition-all"
                             :class="openFaq === i ? 'bg-white/[0.04] border-white/10 shadow-2xl' : ''">
                            <button @click="openFaq = (openFaq === i ? null : i)" class="w-full px-8 py-6 flex items-center justify-between text-left">
                                <h3 class="text-lg font-display font-bold" :class="openFaq === i ? 'text-white' : 'text-slate-300'" x-text="item.q"></h3>
                                <i data-lucide="chevron-down" class="w-6 h-6 transition-transform duration-300" :class="openFaq === i ? 'rotate-180 text-brand-accent' : 'text-slate-500'"></i>
                            </button>
                            <div x-show="openFaq === i" x-collapse>
                                <div class="px-8 pb-8">
                                    <p class="text-slate-400 leading-relaxed border-t border-white/5 pt-6" x-text="item.a"></p>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="pt-24 pb-12 px-8 bg-[#0a0a0a]">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-col lg:flex-row justify-between items-start gap-16 mb-24">
                <div class="max-w-sm">
                    <img :src="LOGO_URL" alt="Logo" class="w-16 h-16 mb-8 drop-shadow-[0_0_20px_rgba(255,62,0,0.3)]">
                    <p class="text-slate-500 text-sm italic font-medium leading-relaxed" x-text="t().footerDesc"></p>
                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-12 sm:gap-24">
                    <template x-for="(section, key) in t().footerLinks" :key="key">
                        <div>
                            <h4 class="font-display font-black text-xs uppercase tracking-[0.2em] mb-10 text-white" x-text="section.title"></h4>
                            <ul class="space-y-4">
                                <template x-for="link in section.links" :key="link.name">
                                    <li>
                                        <template x-if="link.url === 'products-choice'">
                                            <div class="relative inline-block" x-data="{ open: false }" @click.outside="open = false">
                                                <button @click="open = !open" class="text-slate-400 hover:text-white transition-colors text-sm font-medium whitespace-nowrap flex items-center gap-1 group">
                                                    <span x-text="link.name"></span>
                                                    <i data-lucide="chevron-up" class="w-3 h-3 transition-transform" :class="open ? 'rotate-180' : ''"></i>
                                                </button>
                                                <div x-show="open" 
                                                     x-transition:enter="transition ease-out duration-100"
                                                     x-transition:enter-start="opacity-0 scale-95 translate-y-2"
                                                     x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                                                     class="absolute bottom-full mb-2 left-0 bg-[#0a0a0a] border border-white/10 rounded-xl p-1.5 shadow-2xl z-50 min-w-[160px] backdrop-blur-xl">
                                                    <a href="https://id.shp.ee/xR3YhRQT" target="_blank" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors text-slate-300 hover:text-white text-sm">
                                                        <div class="w-6 h-6 flex items-center justify-center rounded-md bg-orange-500/10 text-[#EE4D2D]">
                                                            <svg viewBox="0 0 24 24" class="w-4 h-4 fill-current" xmlns="http://www.w3.org/2000/svg">
                                                                <path d="M19.467 6.4h-2.133V5.067C17.334 2.273 15.06 0 12.267 0 9.473 0 7.2 2.273 7.2 5.067V6.4H5.067A2.135 2.135 0 002.933 8.533v11.2a2.135 2.135 0 002.134 2.134h14.266a2.135 2.135 0 002.134-2.134v-11.2a2.135 2.135 0 00-2.134-2.133zM9.333 5.067c0-1.614 1.32-2.934 2.934-2.934s2.933 1.32 2.933 2.934V6.4H9.333V5.067zm10.134 14.666a.534.534 0 01-.534.534H5.067a.534.534 0 01-.534-.534v-11.2a.534.534 0 01.534-.533h14.266a.534.534 0 01.534.533v11.2z"/>
                                                                <path d="M12.923 11.2s-2.195-.147-3.21.684c-1.12.919-.244 2.17.653 2.454.919.29 2.503.267 2.378 1.488-.088.852-1.393 1.026-2.036.786-.776-.29-1.284-1.027-1.284-1.027l-.88.666s.517 1.15 1.547 1.51c.904.316 2.553.21 2.766-1.18.232-1.522-1.684-1.595-2.528-1.85-.75-.226-1.272-.455-1.163-1.18.102-.676 1.02-.857 1.703-.687.653.161 1.054.673 1.054.673l1.001-.837z"/>
                                                            </svg>
                                                        </div>
                                                        Shopee
                                                    </a>
                                                    <a href="https://discord.gg/8CAc4uMfF8" target="_blank" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors text-slate-300 hover:text-white text-sm">
                                                        <div class="w-6 h-6 flex items-center justify-center rounded-md bg-indigo-500/10 text-indigo-500">
                                                            <i data-lucide="discord" class="w-4 h-4"></i>
                                                        </div>
                                                        Discord
                                                    </a>
                                                </div>
                                            </div>
                                        </template>
                                        <template x-if="link.url === 'help-choice'">
                                            <div class="relative inline-block" x-data="{ open: false }" @click.outside="open = false">
                                                <button @click="open = !open" class="text-slate-400 hover:text-white transition-colors text-sm font-medium whitespace-nowrap flex items-center gap-1 group">
                                                    <span x-text="link.name"></span>
                                                    <i data-lucide="chevron-up" class="w-3 h-3 transition-transform" :class="open ? 'rotate-180' : ''"></i>
                                                </button>
                                                <div x-show="open" 
                                                     x-transition:enter="transition ease-out duration-100"
                                                     x-transition:enter-start="opacity-0 scale-95 translate-y-2"
                                                     x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                                                     class="absolute bottom-full mb-2 left-0 bg-[#0a0a0a] border border-white/10 rounded-xl p-1.5 shadow-2xl z-50 min-w-[160px] backdrop-blur-xl">
                                                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors text-slate-300 hover:text-white text-sm">
                                                        <div class="w-6 h-6 flex items-center justify-center rounded-md bg-brand-accent/10 text-brand-accent">
                                                            <i data-lucide="user" class="w-4 h-4"></i>
                                                        </div>
                                                        xiivu
                                                    </a>
                                                    <a href="#" class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-white/5 transition-colors text-slate-300 hover:text-white text-sm">
                                                        <div class="w-6 h-6 flex items-center justify-center rounded-md bg-brand-accent/10 text-brand-accent">
                                                            <i data-lucide="user" class="w-4 h-4"></i>
                                                        </div>
                                                        xiilit
                                                    </a>
                                                </div>
                                            </div>
                                        </template>
                                        <template x-if="link.url === 'tos' || link.url === 'privacy' || link.url === 'refund'">
                                            <button @click="openLegal(link.url)" class="text-slate-400 hover:text-white transition-colors text-sm font-medium whitespace-nowrap" x-text="link.name"></button>
                                        </template>
                                        <template x-if="link.url !== 'tos' && link.url !== 'privacy' && link.url !== 'refund' && link.url !== 'products-choice' && link.url !== 'help-choice'">
                                            <a :href="link.url" class="text-slate-400 hover:text-white transition-colors text-sm font-medium whitespace-nowrap" x-text="link.name"></a>
                                        </template>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                </div>
            </div>

            <div class="pt-12 border-t border-white/[0.05] flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="text-white font-bold italic tracking-wider text-[11px] uppercase opacity-90">
                    © 2018 - 2026 HOOK UP STORE. ALL RIGHTS RESERVED.
                </div>
                <div class="text-white font-bold italic text-[11px] flex items-center gap-1.5 opacity-90 hover:opacity-100 transition-all">
                    <span x-text="t().footerText.split('❤️')[0]"></span>
                    <span class="text-brand-accent not-italic">❤️</span>
                    <span x-text="t().footerText.split('❤️')[1]"></span>
                </div>
            </div>
        </div>
    </footer>

    <!-- Catalog Modal -->
    <div x-show="isCatalogOpen" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl" x-cloak>
        <div @click.away="isCatalogOpen = false" class="w-full max-w-4xl h-[80vh] bg-[#0a0a0a] border border-white/10 rounded-[40px] flex flex-col overflow-hidden shadow-2xl">
            <div class="p-8 border-b border-white/5 flex items-center justify-between">
                <h2 class="text-2xl font-display font-black uppercase tracking-tighter skew-x-[-3deg]" x-text="t().catalogTitle"></h2>
                <button @click="isCatalogOpen = false" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div class="p-8 overflow-y-auto flex-1 bg-white/[0.01]">
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="p in catalog" :key="p.name">
                        <div class="p-6 rounded-3xl bg-white/[0.02] border border-white/5 hover:border-brand-accent/40 transition-all">
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-[10px] font-black text-brand-accent uppercase tracking-widest font-display" x-text="p.category"></span>
                                <template x-if="p.badge">
                                    <span class="px-2 py-0.5 rounded-sm bg-brand-accent text-white text-[8px] font-black font-display" x-text="p.badge"></span>
                                </template>
                            </div>
                            <h4 class="text-white font-bold mb-1 font-display uppercase tracking-tight" x-text="p.name"></h4>
                            <div class="text-slate-500 text-xs font-accent font-medium" x-text="p.price"></div>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Legal Modal -->
    <div x-show="legalTab" class="fixed inset-0 z-[110] flex items-center justify-center p-6 bg-black/80 backdrop-blur-md" x-cloak>
        <div @click.away="legalTab = null" class="w-full max-w-2xl h-[70vh] bg-[#0a0a0a] border border-white/10 rounded-[32px] flex flex-col overflow-hidden">
            <div class="p-6 border-b border-white/5 flex items-center justify-between">
