<!DOCTYPE html>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Custom Styles for Hook Up Store */
        :root {
            --brand-accent: #ff3e00;
        }

        [x-cloak] { 
            display: none !important; 
        }

        body {
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 62, 0, 0.2) transparent;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background-color: rgba(255, 62, 0, 0.2);
            border-radius: 10px;
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .nitro-card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-blur: 10px;
            position: relative;
            overflow: hidden;
        }

        .nitro-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 62, 0, 0.05),
                transparent
            );
            transition: 0.5s;
        }

        .nitro-card:hover::before {
            left: 100%;
        }

        .skew-emphasis {
            transform: skewX(-3deg);
        }

        .font-display {
            font-family: 'Lexend', sans-serif;
        }

        .font-accent {
            font-family: 'Outfit', sans-serif;
        }

        .faq-content {
            transition: max-height 0.3s ease-out, opacity 0.2s ease-out;
        }
    </style>
    <!-- Alpine.js for Interactivity -->
    <script defer src="https://unpkg.com/@alpinejs/collapse@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->

    <script>
        tailwind.config = {

</head>
