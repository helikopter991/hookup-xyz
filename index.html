    <!-- Policy Modals -->
    <template x-if="activePolicy !== null">
        <div class="fixed inset-0 z-[110] flex items-center justify-center p-4">
            <div @click="activePolicy = null" class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
            <div class="relative w-full max-w-4xl max-h-[80vh] bg-[#0a0a0a] border border-white/10 rounded-[2.5rem] shadow-2xl p-12 overflow-y-auto">
                <button @click="activePolicy = null" class="absolute top-8 right-8 text-white/20 hover:text-orange-500 transition-colors">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
                <div x-show="activePolicy === 'tos'">
                    <h2 class="text-4xl font-black text-white uppercase italic tracking-tighter mb-10" x-text="t.policies.tos.title"></h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <template x-for="item in t.policies.tos.sections">
                            <div class="p-8 rounded-2xl bg-white/5 border border-white/5">
                                <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-4" x-text="item.subtitle"></h3>
                                <p class="text-sm text-white/50 leading-relaxed" x-text="item.text"></p>
                            </div>
                        </template>
                    </div>
                </div>
                <div x-show="activePolicy === 'privacy'">
                    <h2 class="text-4xl font-black text-white uppercase italic tracking-tighter mb-10" x-text="t.policies.privacy.title"></h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <template x-for="item in t.policies.privacy.sections">
                            <div class="p-8 rounded-2xl bg-white/5 border border-white/5">
                                <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-4" x-text="item.subtitle"></h3>
                                <p class="text-sm text-white/50 leading-relaxed" x-text="item.text"></p>
                            </div>
                        </template>
                    </div>
                </div>
                <div x-show="activePolicy === 'refund'">
                    <h2 class="text-4xl font-black text-white uppercase italic tracking-tighter mb-10" x-text="t.policies.refund.title"></h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <template x-for="item in t.policies.refund.sections">
                            <div class="p-8 rounded-2xl bg-white/5 border border-white/5">
                                <h3 class="text-[10px] font-black text-orange-500 uppercase tracking-widest mb-4" x-text="item.subtitle"></h3>
                                <p class="text-sm text-white/50 leading-relaxed" x-text="item.text"></p>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
    <script>
        // Init Lucide
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
